# ======================================================
#   CropMarket 설정 파일
#   작물 시장 시스템의 모든 수치를 이 파일에서 조정합니다.
# ======================================================


# ======================================================
#   가격 회복 주기 (recovery)
# ======================================================
# 일정 시간이 지나면 각 등급의 작물 가격이 자동으로 조금씩 오릅니다.
# 등급마다 독립적으로 타이머가 돌아가며, 매 사이클마다
# min-minutes ~ max-minutes 사이의 랜덤한 시간 후 회복됩니다.
# 회복 폭(%)은 아래 price-adjustment 와 동일한 범위를 사용합니다.
#
# min-minutes : 최소 회복 대기 시간 (분)
# max-minutes : 최대 회복 대기 시간 (분)
recovery:
  normal:
    min-minutes: 1
    max-minutes: 15
  silver:
    min-minutes: 10
    max-minutes: 60
  gold:
    min-minutes: 10
    max-minutes: 90


# ======================================================
#   가격 변동 폭 (price-adjustment)
# ======================================================
# 플레이어가 작물을 판매할 때 가격이 이 범위 안에서 랜덤하게 하락합니다.
# 회복 시에도 동일한 범위로 가격이 상승합니다.
# 소수점 첫째 자리까지 적용됩니다. (예: 1.0 ~ 3.0%)
#
# min-percent : 최소 변동률 (%)
# max-percent : 최대 변동률 (%)
price-adjustment:
  normal:
    min-percent: 1.0
    max-percent: 3.0
  silver:
    min-percent: 7.0
    max-percent: 15.0
  gold:
    min-percent: 10.0
    max-percent: 75.0


# ======================================================
#   세금 설정 (tax)
# ======================================================
# 작물 판매 시 수익에서 세금이 차감됩니다.
#
# default-rate       : 기본 세율 (%)
# reduced-rate       : 감면 세율 (%) — reduced-permission 보유 플레이어에게 적용
# reduced-permission : 감면 세율을 받는 권한 노드
tax:
  default-rate: 10.0
  reduced-rate: 5.0
  reduced-permission: "thetower.weeklyquest.clear"


# ======================================================
#   등급별 가격 구조 (grade-settings)
# ======================================================
# 각 등급의 최고가 배율과 시장 붕괴 관련 수치를 설정합니다.
#
# max-multiplier        : 최고가 = 기준가(base-price) × 이 배율
#                         (각 작물 항목의 max-price와 일치해야 함)
#
# crash-threshold-pct   : 기준가 대비 이 % 이상으로 가격이 올랐을 때
#                         시장 붕괴 확률이 발동되기 시작합니다.
#                         (예: 125 → 기준가의 125% 이상일 때부터 붕괴 가능)
#
# crash-chance-min-pct  : 가격이 임계값(threshold)에 딱 달했을 때의 붕괴 확률 (%)
# crash-chance-max-pct  : 가격이 최고가(max-price)에 달했을 때의 붕괴 확률 (%)
#                         → 현재 가격이 threshold ~ max-price 사이에 있을수록
#                           min-pct ~ max-pct 사이로 선형 증가합니다.
grade-settings:
  normal:
    max-multiplier: 1.5
    crash-threshold-pct: 125
    crash-chance-min-pct: 1.0
    crash-chance-max-pct: 5.0
  silver:
    max-multiplier: 2.0
    crash-threshold-pct: 170
    crash-chance-min-pct: 3.0
    crash-chance-max-pct: 9.0
  gold:
    max-multiplier: 3.0
    crash-threshold-pct: 200
    crash-chance-min-pct: 5.0
    crash-chance-max-pct: 20.0


# ======================================================
#   시장 붕괴 후 복구 설정 (crash-recovery)
# ======================================================
# 시장 붕괴(가격이 0으로 폭락)가 발생하면, 일정 시간 후 자동으로 복구됩니다.
#
# delay-hours        : 붕괴 발생 후 복구까지 걸리는 시간 (시간 단위)
# normal-multiplier  : 복구 시 일반 등급 가격 = 기준가 × 이 배율
# silver-multiplier  : 복구 시 은   등급 가격 = 기준가 × 이 배율
# gold-multiplier    : 복구 시 금   등급 가격 = 기준가 × 이 배율
crash-recovery:
  delay-hours: 6
  normal-multiplier: 1.25
  silver-multiplier: 2.0
  gold-multiplier: 1.5


# ======================================================
#   묶음 판매 수량 (sell-amount)
# ======================================================
# 각 등급의 작물을 1회 판매할 때 필요한 아이템 수량입니다.
# 이 수량만큼 보유하고 있어야 판매 버튼이 활성화되며,
# 판매가 = 현재 가격 × 이 수량으로 계산됩니다.
sell-amount:
  normal: 64
  silver: 8
  gold: 4


# ======================================================
#   씨앗 구매 설정 (seeds)
# ======================================================
# 씨앗 상점에서 씨앗을 구매할 때의 가격과 수량입니다.
#
# default-price : 씨앗 1개당 가격 (원)
# buy-amounts   : 세부 구매창에 표시될 수량 선택지 (최대 3개)
#                 플레이어가 원하는 수량을 선택하여 구매할 수 있습니다.
seeds:
  default-price: 100.0
  buy-amounts: [4, 8, 64]


# ======================================================
#   수확량 기반 가격 변동 보정 (yield-adjustment)
# ======================================================
# 작물의 최대 수확량(max-harvest)에 따라 price-adjustment 의
# 판매 시 하락 폭을 자동으로 조정합니다.
# 수확량이 많을수록(고가치 작물일수록) 하락폭이 작아집니다.
#
# enabled          : true 면 보정 활성화 / false 면 모든 작물에 동일 범위 적용
# base-max-harvest : 보정 기준이 되는 최대 수확량 (고추 기준 = 4)
#                   이 값과 작물의 max-harvest 의 차이만큼 보정됩니다.
# per-harvest-step : 수확량 1 증가당 min-percent 감소량 (max-percent 는 2배 감소)
#                   예) step=0.15, base=4, 작물max=8 이면
#                       normal 기준: min 1.0→0.4, max 3.0→1.8
yield-adjustment:
  enabled: true
  base-max-harvest: 4
  per-harvest-step: 0.15


# ======================================================
#   보이지 않는 손 (invisible-hand)
# ======================================================
# 시장 붕괴 발생 시 일정 확률로 "보이지 않는 손"이 발동합니다.
# 발동 시 모든 작물의 모든 등급 가격이
# 기준가(base-price) × 50% ~ 최고가(max-price) 사이에서 무작위로 재조정됩니다.
# 서버 전체에 발동 메시지가 브로드캐스트됩니다.
#
# enabled    : true 면 기능 활성화 / false 면 비활성화
# chance-pct : 시장 붕괴 1회 발생 시 발동 확률 (%)
invisible-hand:
  enabled: true
  chance-pct: 10


# ======================================================
