# ==============================
#   CropMarket 설정 파일
# ==============================

# 가격 자연 회복 인터벌 (등급별 독립 운영, 분단위)
recovery:
  normal:
    min-minutes: 1
    max-minutes: 15
  silver:
    min-minutes: 10
    max-minutes: 60
  gold:
    min-minutes: 10
    max-minutes: 90
  # 회복 폭은 price-adjustment 와 동일한 범위를 사용합니다

# 판매 시 가격 하락률 (%) — 회복 시에도 동일 범위 적용
price-adjustment:
  normal:
    min-percent: 1.0
    max-percent: 3.0
  silver:
    min-percent: 7.0
    max-percent: 15.0
  gold:
    min-percent: 10.0
    max-percent: 75.0

# ==============================
#   세금 설정
# ==============================
tax:
  default-rate: 10.0
  reduced-rate: 5.0
  reduced-permission: "thetower.weeklyquest.clear"

# ==============================
#   등급별 가격 구조
# ==============================
# max-multiplier      : 최고가 배율 (기준가 × 배율)
# crash-threshold-pct : 이 % 이하로 내려갈 때 크래시 확률 발동
# crash-chance-pct    : 크래시 발동 확률 (%)
grade-settings:
  normal:
    max-multiplier: 1.5
    crash-threshold-pct: 125
    crash-chance-min-pct: 1.0
    crash-chance-max-pct: 5.0
  silver:
    max-multiplier: 2.0
    crash-threshold-pct: 170
    crash-chance-min-pct: 3.0
    crash-chance-max-pct: 9.0
  gold:
    max-multiplier: 3.0
    crash-threshold-pct: 200
    crash-chance-min-pct: 5.0
    crash-chance-max-pct: 20.0

# ==============================
#   크래시 후 복구 설정
# ==============================
# 크래시 발생 → delay-hours 후 해당 등급 가격을 기준가 × 배율로 설정
crash-recovery:
  delay-hours: 6
  normal-multiplier: 1.25
  silver-multiplier: 2.0
  gold-multiplier: 1.5

# ==============================
#   씨앗 구매 설정
# ==============================
seeds:
  default-price: 100.0   # 씨앗 개당 가격 (원)
  buy-amount: 64         # 1회 좌클릭 구매 수량

